<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译模型评估报告</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div>
      <h1>翻译模型评估报告</h1>
      <p id="subtitle">加载中…</p>
    </div>
    <div class="model-tabs" id="model-tabs"></div>
  </header>

  <main>
    <div id="loading" class="loading">正在加载评估数据…</div>
    <div id="content" class="hidden">
      <section id="overview-section">
        <h2 class="section-title">综合概览</h2>
        <div class="cards" id="overview-cards"></div>
      </section>

      <section id="compare-section" class="compare-section hidden">
        <h2 class="section-title">模型对比</h2>
        <div class="panel">
          <table class="compare-table" id="compare-table">
            <thead>
              <tr>
                <th>模型</th>
                <th>样本数</th>
                <th>平均分</th>
                <th>中位数</th>
                <th>最低/最高</th>
                <th>平均延迟</th>
                <th>P95 延迟</th>
                <th>&lt;50 分占比</th>
                <th>格式错误</th>
                <th>调用失败</th>
                <th>总价（估算）</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section>
        <h2 class="section-title">维度分析</h2>
        <div class="grid-2">
          <div class="panel">
            <h3>评分分布</h3>
            <div class="chart-wrap"><canvas id="chart-distribution"></canvas></div>
          </div>
          <div class="panel">
            <h3>按数据集</h3>
            <div class="chart-wrap"><canvas id="chart-dataset"></canvas></div>
          </div>
        </div>
        <div class="grid-2">
          <div class="panel">
            <h3>按语言对（Top 15）</h3>
            <div class="chart-wrap"><canvas id="chart-langpair"></canvas></div>
          </div>
          <div class="panel">
            <h3>延迟分布</h3>
            <div class="chart-wrap"><canvas id="chart-latency"></canvas></div>
          </div>
        </div>
      </section>

      <section>
        <h2 class="section-title">明细记录</h2>
        <div class="filters">
          <label>数据集
            <select id="filter-dataset"><option value="">全部</option></select>
          </label>
          <label>语言对
            <select id="filter-langpair"><option value="">全部</option></select>
          </label>
          <label>最低分
            <input type="number" id="filter-min-score" min="0" max="100" placeholder="0">
          </label>
          <label>最高分
            <input type="number" id="filter-max-score" min="0" max="100" placeholder="100">
          </label>
          <label>搜索
            <input type="search" id="filter-q" placeholder="原文 / 译文 / 参考">
          </label>
        </div>
        <div class="records-table-wrap">
          <table class="records-table">
            <thead>
              <tr>
                <th>数据集</th>
                <th>语言对</th>
                <th>原文</th>
                <th>参考译文</th>
                <th>模型输出</th>
                <th>评分</th>
                <th>延迟</th>
                <th>Token</th>
                <th>价格</th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
        <div class="pagination">
          <span id="page-info"></span>
          <div>
            <button id="prev-page">上一页</button>
            <button id="next-page">下一页</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
